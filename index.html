<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Tetris — Classic Arcade Tetris in Your Browser</title>
    <meta name="description" content="Play a free retro-style Tetris in your browser. Classic, Extra, Speedrun and Versus modes with smooth controls, hold piece and progressive difficulty." />
    <meta name="author" content="Retro Tetris" />
    <link rel="canonical" href="https://tetris-fall.lovable.app/" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Tetris" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Links -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Retro Tetris — Classic Arcade Tetris in Your Browser" />
    <meta property="og:description" content="Play a free retro-style Tetris in your browser. Classic, Extra, Speedrun and Versus modes with smooth controls and progressive difficulty." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tetris-fall.lovable.app/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Retro Tetris — Classic Arcade Tetris" />
    <meta name="twitter:description" content="Play a free retro-style Tetris in your browser with Classic, Extra, Speedrun and Versus modes." />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Retro Tetris",
        "url": "https://tetris-fall.lovable.app/"
      }
    </script>

    <!-- Structured Data: VideoGame -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Retro Tetris",
        "url": "https://tetris-fall.lovable.app/",
        "description": "A free retro-style Tetris with Classic, Extra, Speedrun and Versus modes. Playable in any modern browser, installable as a PWA.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "genre": ["Puzzle", "Arcade"],
        "gamePlatform": "Web Browser",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
